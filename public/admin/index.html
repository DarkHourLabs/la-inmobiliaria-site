<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>La Inmobiliaria | CMS</title>
  <style>
    /* Remove gradient from Location/Map field and all object widget headers */
    div[style*="linear-gradient"] {
      background: #f5f5f5 !important;
      background-image: none !important;
    }
    div[class] > div[style*="background"] {
      background: #f5f5f5 !important;
      background-image: none !important;
    }
    /* Never override the map iframe itself */
    iframe {
      background: transparent !important;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var style = document.createElement('style');
      style.textContent = [
        '/* Override Sveltia/Decap CMS object widget gradients at runtime */',
        '[style*="linear-gradient"] { background: #f5f5f5 !important; background-image: none !important; }',
        '[style*="background"][class] { background: #f5f5f5 !important; background-image: none !important; }',
        'iframe { background: transparent !important; }',
      ].join('\n');
      document.head.appendChild(style);
    });
  </script>
</head>
<body>

<!-- Sveltia CMS (drop-in Decap CMS replacement) -->
<script src="https://cdn.jsdelivr.net/npm/@sveltia/cms/dist/sveltia-cms.js"></script>

</body>
</html>
