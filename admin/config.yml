backend:
  name: github
  repo: DarkHourLabs/la-inmobiliaria-site
  branch: main

media_folder: "images"
public_folder: "/images"

locale: "es"

collections:
  - name: "pages"
    label: "Páginas"
    files:
      - name: "index"
        label: "Inicio"
        file: "index.html"
        fields:
          - { label: "Contenido HTML", name: "body", widget: "code", default_language: "html", output_code_only: true }

      - name: "servicios"
        label: "Servicios"
        file: "servicios.html"
        fields:
          - { label: "Contenido HTML", name: "body", widget: "code", default_language: "html", output_code_only: true }

      - name: "nosotros"
        label: "Nosotros"
        file: "nosotros.html"
        fields:
          - { label: "Contenido HTML", name: "body", widget: "code", default_language: "html", output_code_only: true }

      - name: "personal"
        label: "Personal / Equipo"
        file: "personal.html"
        fields:
          - { label: "Contenido HTML", name: "body", widget: "code", default_language: "html", output_code_only: true }

      - name: "contacto"
        label: "Contacto"
        file: "contacto.html"
        fields:
          - { label: "Contenido HTML", name: "body", widget: "code", default_language: "html", output_code_only: true }

      - name: "preguntas"
        label: "Preguntas Frecuentes"
        file: "preguntas.html"
        fields:
          - { label: "Contenido HTML", name: "body", widget: "code", default_language: "html", output_code_only: true }
