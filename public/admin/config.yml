backend:
  name: github
  repo: DarkHourLabs/la-inmobiliaria-site
  branch: main
  base_url: https://lainmobiliaria.mx
  auth_endpoint: api/auth

# Media — Cloudinary (images stored in Cloudinary, not the Git repo)
media_library:
  name: cloudinary
  config:
    cloud_name: dqom6oy7t
    api_key: 833243661766811
    # API secret is server-side only; do not put it here

# Fallback local folders (used only if Cloudinary widget is unavailable)
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Site URL (for preview links)
site_url: https://lainmobiliaria.mx

collections:
  # ─── PROPERTIES ───────────────────────────────────────────────
  - name: "properties"
    label: "Properties"
    label_singular: "Property"
    folder: "src/content/properties"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Zone", name: "zone", widget: "string", hint: "Zone slug (e.g.: centro, marina, centenario)" }
      - { label: "Price", name: "price", widget: "number" }
      - { label: "Original Price", name: "originalPrice", widget: "number", required: false }
      - { label: "Currency", name: "currency", widget: "select", options: ["MXN", "USD"], default: "MXN" }
      - { label: "Bedrooms", name: "bedrooms", widget: "number", value_type: "int" }
      - { label: "Bathrooms", name: "bathrooms", widget: "number", value_type: "int" }
      - { label: "Size (m²)", name: "size", widget: "number" }
      - { label: "Size Unit", name: "sizeUnit", widget: "string", default: "m²", required: false }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Available", value: "available" }
          - { label: "Pending", value: "pending" }
          - { label: "Sold", value: "sold" }
        default: "available"
      - { label: "Main Image", name: "image", widget: "image" }
      - label: "Image Gallery"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - label: "Location"
        name: "location"
        widget: "object"
        fields:
          - { label: "Address", name: "address", widget: "string" }
          - label: "Coordinates"
            name: "coordinates"
            widget: "object"
            required: false
            fields:
              - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
              - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }
      - label: "Amenities"
        name: "amenities"
        widget: "list"
        required: false
        field: { label: "Amenity", name: "amenity", widget: "string" }
      - label: "Facilities"
        name: "facilities"
        widget: "list"
        required: false
        field: { label: "Facility", name: "facility", widget: "string" }
      - { label: "Year Built", name: "yearBuilt", widget: "number", value_type: "int", required: false }
      - { label: "Parking", name: "parking", widget: "number", value_type: "int", required: false }
      - { label: "Agent ID", name: "agent-id", widget: "string", required: false }
      - { label: "Created At", name: "createdAt", widget: "datetime", required: false }
      - { label: "Updated At", name: "updatedAt", widget: "datetime", required: false }
      - { label: "Content", name: "body", widget: "markdown", required: false }

  # ─── AGENTS ───────────────────────────────────────────────────
  - name: "agents"
    label: "Agents"
    label_singular: "Agent"
    folder: "src/content/agents"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Agent ID", name: "agent-id", widget: "string" }
      - { label: "Title (slug)", name: "title", widget: "string", hint: "Unique identifier, e.g.: ana-garcia" }
      - { label: "Full Name", name: "name", widget: "string" }
      - { label: "Job Title", name: "jobTitle", widget: "string" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Email", name: "email", widget: "string" }
      - { label: "Phone", name: "phone", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }
      - label: "Languages"
        name: "languages"
        widget: "list"
        required: false
        field: { label: "Language", name: "language", widget: "string" }
      - label: "Specialties"
        name: "specialties"
        widget: "list"
        required: false
        field: { label: "Specialty", name: "specialty", widget: "string" }
      - { label: "Experience", name: "experience", widget: "string", required: false }

  # ─── ZONES ────────────────────────────────────────────────────
  - name: "zones"
    label: "Zones"
    label_singular: "Zone"
    folder: "src/content/zones"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Long Description", name: "overview", widget: "markdown" }
      - { label: "Main Image", name: "image", widget: "image" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
      - { label: "Map Embed URL", name: "mapEmbedUrl", widget: "string", required: false }
      - label: "Map Coordinates"
        name: "coordinates"
        widget: "object"
        required: false
        fields:
          - label: "Center"
            name: "center"
            widget: "object"
            fields:
              - { label: "Latitude", name: "lat", widget: "number", value_type: "float" }
              - { label: "Longitude", name: "lng", widget: "number", value_type: "float" }
          - { label: "Zoom", name: "zoom", widget: "number", value_type: "int", default: 14 }
      - label: "Features"
        name: "features"
        widget: "list"
        required: false
        field: { label: "Feature", name: "feature", widget: "string" }
      - { label: "Average Price", name: "averagePrice", widget: "number", required: false }
