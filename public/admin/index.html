<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>La Inmobiliaria | CMS</title>
  <style>
    /* ── CSS theme variables ── */
    :root {
      color-scheme: light;
    }
    [data-theme="dark"] {
      color-scheme: dark;
    }

    /* ── Toolbar ── */
    #cms-toolbar {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: rgba(128,128,128,0.15);
      backdrop-filter: blur(8px);
      border-bottom-left-radius: 8px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
    }
    #cms-toolbar .tb-label {
      opacity: 0.55;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #cms-toolbar button {
      cursor: pointer;
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid rgba(128,128,128,0.4);
      background: rgba(255,255,255,0.6);
      color: #333;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #cms-toolbar button:hover {
      background: rgba(255,255,255,0.9);
    }
    #cms-toolbar button.active {
      background: #2d3748;
      color: #fff;
      border-color: transparent;
    }
    [data-theme="dark"] #cms-toolbar button {
      background: rgba(45,55,72,0.7);
      color: #e2e8f0;
      border-color: rgba(255,255,255,0.2);
    }
    [data-theme="dark"] #cms-toolbar button:hover {
      background: rgba(74,85,104,0.9);
    }
    [data-theme="dark"] #cms-toolbar button.active {
      background: #63b3ed;
      color: #1a202c;
    }
    #cms-toolbar .sep {
      width: 1px;
      height: 18px;
      background: rgba(128,128,128,0.35);
      margin: 0 2px;
    }

    /* ── Dark mode overlay for Decap CMS ── */
    [data-theme="dark"] #nc-root {
      filter: invert(1) hue-rotate(180deg);
    }
    [data-theme="dark"] #nc-root img,
    [data-theme="dark"] #nc-root video,
    [data-theme="dark"] #nc-root [class*="PreviewPane"] {
      filter: invert(1) hue-rotate(180deg);
    }
  </style>
</head>
<body>

<!-- ── Toolbar ── -->
<div id="cms-toolbar">
  <span class="tb-label">Lang</span>
  <button id="btn-en" onclick="setLocale('en')">EN</button>
  <button id="btn-es" onclick="setLocale('es')">ES</button>
  <div class="sep"></div>
  <span class="tb-label">Theme</span>
  <button id="btn-light"  onclick="setTheme('light')">☀️</button>
  <button id="btn-dark"   onclick="setTheme('dark')">🌙</button>
  <button id="btn-system" onclick="setTheme('system')">💻</button>
</div>

<!-- Tell Decap CMS to wait for manual init -->
<script>window.CMS_MANUAL_INIT = true;</script>
<!-- Decap CMS -->
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

<script>
// ── Locale helpers ─────────────────────────────────────────────────
function getLocale() {
  return localStorage.getItem('cms-locale') || 'en';
}
function setLocale(lang) {
  localStorage.setItem('cms-locale', lang);
  location.reload();
}
function updateLocaleButtons() {
  var lang = getLocale();
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
}

// ── Theme helpers ──────────────────────────────────────────────────
function getThemePref() {
  return localStorage.getItem('cms-theme') || 'system';
}
function resolveTheme(pref) {
  if (pref === 'system') {
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  return pref;
}
function applyTheme(pref) {
  pref = pref || getThemePref();
  document.documentElement.setAttribute('data-theme', resolveTheme(pref));
  ['light','dark','system'].forEach(function(t) {
    document.getElementById('btn-' + t).classList.toggle('active', pref === t);
  });
}
function setTheme(pref) {
  localStorage.setItem('cms-theme', pref);
  applyTheme(pref);
}

// ── Apply prefs immediately ────────────────────────────────────────
applyTheme();
updateLocaleButtons();

// System theme watcher
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
  if (getThemePref() === 'system') applyTheme('system');
});

// ── CMS init ──────────────────────────────────────────────────────
// Let Decap load config.yml directly (no programmatic config injection).
// Locale is set via localStorage before init — Decap reads cms-locale
// automatically in v3, so no config argument is needed.
localStorage.setItem('cms-locale', getLocale());
window.CMS.init();
</script>

</body>
</html>
