backend:
  name: github
  repo: DarkHourLabs/la-inmobiliaria-site
  branch: main
  base_url: https://lainmobiliaria.mx
  auth_endpoint: api/auth

# Media files stored in public/images
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Site URL (for preview links)
site_url: https://lainmobiliaria.mx

locale: en

collections:
  # ─── PROPERTIES ───────────────────────────────────────────────
  - name: "properties"
    label: "Propiedades"
    label_singular: "Propiedad"
    folder: "src/content/properties"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Zona", name: "zone", widget: "string", hint: "Slug de la zona (ej: centro, marina, centenario)" }
      - { label: "Precio", name: "price", widget: "number" }
      - { label: "Precio Original", name: "originalPrice", widget: "number", required: false }
      - { label: "Moneda", name: "currency", widget: "select", options: ["MXN", "USD"], default: "MXN" }
      - { label: "Recámaras", name: "bedrooms", widget: "number", value_type: "int" }
      - { label: "Baños", name: "bathrooms", widget: "number", value_type: "int" }
      - { label: "Tamaño (m²)", name: "size", widget: "number" }
      - { label: "Unidad de tamaño", name: "sizeUnit", widget: "string", default: "m²", required: false }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Destacada", name: "featured", widget: "boolean", default: false }
      - label: "Estado"
        name: "status"
        widget: "select"
        options:
          - { label: "Disponible", value: "available" }
          - { label: "En proceso", value: "pending" }
          - { label: "Vendida", value: "sold" }
        default: "available"
      - { label: "Imagen principal", name: "image", widget: "image" }
      - label: "Galería de imágenes"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Imagen", name: "image", widget: "image" }
      - label: "Ubicación"
        name: "location"
        widget: "object"
        fields:
          - { label: "Dirección", name: "address", widget: "string" }
          - label: "Coordenadas"
            name: "coordinates"
            widget: "object"
            required: false
            fields:
              - { label: "Latitud", name: "lat", widget: "number", value_type: "float" }
              - { label: "Longitud", name: "lng", widget: "number", value_type: "float" }
      - label: "Amenidades"
        name: "amenities"
        widget: "list"
        required: false
        field: { label: "Amenidad", name: "amenity", widget: "string" }
      - label: "Instalaciones"
        name: "facilities"
        widget: "list"
        required: false
        field: { label: "Instalación", name: "facility", widget: "string" }
      - { label: "Año de construcción", name: "yearBuilt", widget: "number", value_type: "int", required: false }
      - { label: "Estacionamientos", name: "parking", widget: "number", value_type: "int", required: false }
      - { label: "ID del agente", name: "agent-id", widget: "string", required: false }
      - { label: "Creado", name: "createdAt", widget: "datetime", required: false }
      - { label: "Actualizado", name: "updatedAt", widget: "datetime", required: false }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }

  # ─── AGENTS ───────────────────────────────────────────────────
  - name: "agents"
    label: "Agentes"
    label_singular: "Agente"
    folder: "src/content/agents"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "ID del agente", name: "agent-id", widget: "string" }
      - { label: "Título (slug)", name: "title", widget: "string", hint: "Identificador único, ej: ana-garcia" }
      - { label: "Nombre completo", name: "name", widget: "string" }
      - { label: "Puesto", name: "jobTitle", widget: "string" }
      - { label: "Biografía", name: "bio", widget: "text" }
      - { label: "Email", name: "email", widget: "string" }
      - { label: "Teléfono", name: "phone", widget: "string" }
      - { label: "Foto", name: "image", widget: "image" }
      - label: "Idiomas"
        name: "languages"
        widget: "list"
        required: false
        field: { label: "Idioma", name: "language", widget: "string" }
      - label: "Especialidades"
        name: "specialties"
        widget: "list"
        required: false
        field: { label: "Especialidad", name: "specialty", widget: "string" }
      - { label: "Experiencia", name: "experience", widget: "string", required: false }

  # ─── ZONES ────────────────────────────────────────────────────
  - name: "zones"
    label: "Zonas"
    label_singular: "Zona"
    folder: "src/content/zones"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descripción corta", name: "description", widget: "text" }
      - { label: "Descripción larga", name: "overview", widget: "markdown" }
      - { label: "Imagen principal", name: "image", widget: "image" }
      - { label: "Miniatura", name: "thumbnail", widget: "image", required: false }
      - { label: "URL de mapa embed", name: "mapEmbedUrl", widget: "string", required: false }
      - label: "Coordenadas del mapa"
        name: "coordinates"
        widget: "object"
        required: false
        fields:
          - label: "Centro"
            name: "center"
            widget: "object"
            fields:
              - { label: "Latitud", name: "lat", widget: "number", value_type: "float" }
              - { label: "Longitud", name: "lng", widget: "number", value_type: "float" }
          - { label: "Zoom", name: "zoom", widget: "number", value_type: "int", default: 14 }
      - label: "Características"
        name: "features"
        widget: "list"
        required: false
        field: { label: "Característica", name: "feature", widget: "string" }
      - { label: "Precio promedio", name: "averagePrice", widget: "number", required: false }
