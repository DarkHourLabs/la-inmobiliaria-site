backend:
  name: github
  repo: DarkHourLabs/la-inmobiliaria-site
  branch: main
  base_url: https://la-inmobiliaria-houses-boutique.vercel.app
  auth_endpoint: api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "es"

collections:
  # ─────────────────────────────────────────────
  # PROPERTIES
  # ─────────────────────────────────────────────
  - name: "properties"
    label: "Propiedades"
    label_singular: "Propiedad"
    folder: "src/content/properties"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Zona", name: "zone", widget: "select",
          options: ["Centro", "Marina", "El Mogote", "Pichilingue", "El Centenario"] }
      - { label: "Precio (MXN)", name: "price", widget: "number", value_type: "int" }
      - { label: "Precio Original (MXN)", name: "originalPrice", widget: "number", value_type: "int", required: false }
      - { label: "Moneda", name: "currency", widget: "hidden", default: "MXN" }
      - { label: "Recámaras", name: "bedrooms", widget: "number", value_type: "int" }
      - { label: "Baños", name: "bathrooms", widget: "number", value_type: "int" }
      - { label: "Superficie (m²)", name: "size", widget: "number", value_type: "int" }
      - { label: "Unidad de Superficie", name: "sizeUnit", widget: "hidden", default: "m²" }
      - { label: "Descripción", name: "description", widget: "text" }
      - label: "Estado"
        name: "status"
        widget: "select"
        options:
          - { label: "Disponible", value: "available" }
          - { label: "En Proceso", value: "pending" }
          - { label: "Vendida", value: "sold" }
        default: "available"
      - { label: "Destacada", name: "featured", widget: "boolean", default: false }
      - { label: "Imagen Principal", name: "image", widget: "string",
          hint: "URL de imagen (Unsplash, Cloudinary, etc.)" }
      - label: "Galería de Imágenes"
        name: "images"
        widget: "list"
        required: false
        field: { label: "URL de Imagen", name: "url", widget: "string" }
      - label: "Ubicación"
        name: "location"
        widget: "object"
        fields:
          - { label: "Dirección", name: "address", widget: "string" }
          - label: "Coordenadas"
            name: "coordinates"
            widget: "object"
            required: false
            fields:
              - { label: "Latitud", name: "lat", widget: "number", value_type: "float" }
              - { label: "Longitud", name: "lng", widget: "number", value_type: "float" }
      - label: "Amenidades"
        name: "amenities"
        widget: "list"
        required: false
        field: { label: "Amenidad", name: "item", widget: "string" }
      - label: "Instalaciones"
        name: "facilities"
        widget: "list"
        required: false
        field: { label: "Instalación", name: "item", widget: "string" }
      - { label: "Año de Construcción", name: "yearBuilt", widget: "number", value_type: "int", required: false }
      - { label: "Estacionamientos", name: "parking", widget: "number", value_type: "int", required: false }
      - { label: "ID del Agente", name: "agent-id", widget: "string", required: false }
      - label: "SEO"
        name: "meta"
        widget: "object"
        required: false
        fields:
          - { label: "Título SEO", name: "title", widget: "string", required: false }
          - { label: "Descripción SEO", name: "description", widget: "text", required: false }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }

  # ─────────────────────────────────────────────
  # AGENTS
  # ─────────────────────────────────────────────
  - name: "agents"
    label: "Agentes"
    label_singular: "Agente"
    folder: "src/content/agents"
    create: true
    slug: "{{fields.agent-id}}"
    extension: "md"
    fields:
      - { label: "ID del Agente", name: "agent-id", widget: "string",
          hint: "Identificador único, sin espacios. Ej: sofia-rios" }
      - { label: "Nombre Completo", name: "name", widget: "string" }
      - { label: "Título (display)", name: "title", widget: "string" }
      - { label: "Puesto", name: "jobTitle", widget: "string" }
      - { label: "Biografía", name: "bio", widget: "text" }
      - { label: "Email", name: "email", widget: "string" }
      - { label: "Teléfono", name: "phone", widget: "string" }
      - { label: "Foto", name: "image", widget: "string",
          hint: "URL de foto (Unsplash, Cloudinary, etc.)" }
      - label: "Idiomas"
        name: "languages"
        widget: "list"
        required: false
        field: { label: "Idioma", name: "lang", widget: "string" }
      - label: "Especialidades"
        name: "specialties"
        widget: "list"
        required: false
        field: { label: "Especialidad", name: "item", widget: "string" }
      - { label: "Experiencia", name: "experience", widget: "string", required: false,
          hint: "Ej: 8 años" }
      - { label: "Contenido / Bio larga", name: "body", widget: "markdown", required: false }

  # ─────────────────────────────────────────────
  # ZONES
  # ─────────────────────────────────────────────
  - name: "zones"
    label: "Zonas"
    label_singular: "Zona"
    folder: "src/content/zones"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - { label: "Nombre de la Zona", name: "title", widget: "string" }
      - { label: "Descripción Corta", name: "description", widget: "text" }
      - { label: "Texto de Vista General", name: "overview", widget: "text" }
      - { label: "Imagen Principal", name: "image", widget: "string" }
      - { label: "Miniatura", name: "thumbnail", widget: "string", required: false }
      - { label: "URL de Mapa Embed", name: "mapEmbedUrl", widget: "string", required: false }
      - label: "Características"
        name: "features"
        widget: "list"
        required: false
        field: { label: "Característica", name: "item", widget: "string" }
      - { label: "Precio Promedio (MXN)", name: "averagePrice", widget: "number",
          value_type: "int", required: false }
      - { label: "Contenido", name: "body", widget: "markdown", required: false }
