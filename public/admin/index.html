<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>La Inmobiliaria | CMS</title>
  <style>
    /* Theme variables */
    :root {
      --toggle-bg: rgba(255,255,255,0.12);
      --toggle-text: #fff;
      --toggle-border: rgba(255,255,255,0.25);
    }

    /* Dark mode overrides for Decap root */
    html.cms-theme-dark body > div#nc-root {
      filter: invert(0); /* Decap has its own theming; we handle via class */
    }

    /* CMS toggle bar — hidden until injected into header */
    #cms-toggles {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      padding-right: 16px;
    }

    #cms-toggles button {
      background: var(--toggle-bg);
      color: var(--toggle-text);
      border: 1px solid var(--toggle-border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #cms-toggles button:hover {
      background: rgba(255,255,255,0.22);
    }

    #cms-toggles button.active {
      background: rgba(255,255,255,0.3);
      font-weight: bold;
    }

    /* Dark mode for Decap — inject dark background when system/dark chosen */
    html.cms-theme-dark #nc-root,
    html.cms-theme-dark .cms-app {
      background: #1a1a2e !important;
    }
  </style>
</head>
<body>

<!-- Decap CMS -->
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

<script>
(function () {
  'use strict';

  // ── Preferences ──────────────────────────────────────────────
  const LANG_KEY  = 'cms_lang';
  const THEME_KEY = 'cms_theme';

  function getLang()  { return localStorage.getItem(LANG_KEY)  || 'en'; }
  function getTheme() { return localStorage.getItem(THEME_KEY) || 'system'; }

  function setLang(v)  { localStorage.setItem(LANG_KEY,  v); location.reload(); }
  function setTheme(v) { localStorage.setItem(THEME_KEY, v); applyTheme(v); renderToggles(); }

  // ── Theme application ─────────────────────────────────────────
  function resolveTheme(pref) {
    if (pref === 'system') {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    return pref;
  }

  function applyTheme(pref) {
    const t = resolveTheme(pref);
    document.documentElement.classList.toggle('cms-theme-dark', t === 'dark');
  }

  // Apply theme immediately on load
  applyTheme(getTheme());

  // ── Toggle bar rendering ──────────────────────────────────────
  function renderToggles() {
    const bar = document.getElementById('cms-toggles');
    if (!bar) return;

    const lang  = getLang();
    const theme = getTheme();

    const labels = {
      en: { langEN: 'EN', langES: 'ES', light: '☀ Light', dark: '🌙 Dark', system: '⚙ System' },
      es: { langEN: 'EN', langES: 'ES', light: '☀ Claro', dark: '🌙 Oscuro', system: '⚙ Sistema' },
    };
    const L = labels[lang] || labels.en;

    bar.innerHTML = `
      <button class="${lang === 'en' ? 'active' : ''}" onclick="window._cmsSetLang('en')">${L.langEN}</button>
      <button class="${lang === 'es' ? 'active' : ''}" onclick="window._cmsSetLang('es')">${L.langES}</button>
      <span style="color:rgba(255,255,255,0.3);font-size:10px;">|</span>
      <button class="${theme === 'light'  ? 'active' : ''}" onclick="window._cmsSetTheme('light')">${L.light}</button>
      <button class="${theme === 'dark'   ? 'active' : ''}" onclick="window._cmsSetTheme('dark')">${L.dark}</button>
      <button class="${theme === 'system' ? 'active' : ''}" onclick="window._cmsSetTheme('system')">${L.system}</button>
    `;
  }

  window._cmsSetLang  = setLang;
  window._cmsSetTheme = setTheme;

  // ── Inject toggle bar into Decap header after login ───────────
  // We watch the DOM for the Decap top nav/header and inject our bar.
  // The login page does NOT have this header, so toggles stay hidden there.
  let injected = false;

  function tryInject() {
    if (injected) return;

    // Decap renders a header/nav bar after login — look for it
    const header = document.querySelector('header') ||
                   document.querySelector('[class*="AppHeader"]') ||
                   document.querySelector('[class*="top-bar"]') ||
                   document.querySelector('nav[class]');

    if (!header) return;

    // Make sure we're past the login screen (login has no real nav)
    // The dashboard nav contains links/buttons — check for meaningful content
    const hasNav = header.querySelector('a, button');
    if (!hasNav) return;

    // Already injected?
    if (document.getElementById('cms-toggles')) {
      injected = true;
      return;
    }

    const bar = document.createElement('div');
    bar.id = 'cms-toggles';
    header.appendChild(bar);
    renderToggles();
    injected = true;
  }

  // Observe DOM for Decap rendering
  const observer = new MutationObserver(function () {
    tryInject();
    // Re-check if user logs out and logs back in
    if (injected && !document.getElementById('cms-toggles')) {
      injected = false;
    }
  });

  observer.observe(document.body, { childList: true, subtree: true });

  // ── Locale (language) ─────────────────────────────────────────
  // Set Decap locale before init if Spanish is selected
  const currentLang = getLang();
  if (currentLang === 'es') {
    // Decap CMS 3.x locale support — register a minimal Spanish locale
    // so UI strings switch. Falls back gracefully if locale not fully supported.
    window.CMS_LOCALE = 'es';
  }

  // ── Init CMS ──────────────────────────────────────────────────
  window.CMS.init();

})();
</script>

</body>
</html>
